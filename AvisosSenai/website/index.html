<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avisos Senai</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex min-h-screen flex-col bg-gray-100">

    <header>
        <nav class="flex items-center justify-between bg-blue-950 px-6 py-4 text-white">
            <div class="flex flex-row gap-1">
                <h1 class="text-4xl font-bold tracking-tight">Avisos</h1>
                <h1 class="text-4xl font-bold tracking-tight text-orange-600">Senai</h1>
            </div>

            <div id="menu-admin" class="hidden gap-6 font-medium md:flex">
                <button onclick="irAdicionar()" class="transition hover:text-blue-300">Adicionar</button>
                <button onclick="irDeletar()" class="transition hover:text-blue-300">Deletar</button>
            </div>

         
            <div class="flex-none">
                <button id="btn-login"
                        onclick="irLogin()"
                        class="rounded bg-white px-4 py-1 font-semibold text-blue-950 transition hover:bg-gray-200">
                    Login
                </button>
            </div>
        </nav>
    </header>

    <main class="grow p-8">
        <article class="mx-auto max-w-4xl">
            <h2 class="mb-6 text-xl font-semibold">Últimos avisos</h2>

            <ul id="lista-avisos" class="grid grid-cols-1 gap-4 sm:grid-cols-2 md:grid-cols-4"></ul>
        </article>
    </main>

    <footer class="mt-auto bg-blue-950 py-4 text-center text-sm text-white">
        &copy; 2026 Avisos Senai - All rights reserved
    </footer>

    <script>
        
        function verificarLogin() {
            const logado = localStorage.getItem('logado') === 'true';

            const menuAdmin = document.getElementById('menu-admin');
            const btnLogin = document.getElementById('btn-login');

            if (logado) {
                menuAdmin.classList.remove('hidden'); 
                btnLogin.classList.add('hidden');    
            } else {
                menuAdmin.classList.add('hidden');   
                btnLogin.classList.remove('hidden');  
            }
        }

       
        function irLogin() {
            window.location.href = 'login.html';
        }

        function irAdicionar() {
            window.location.href = 'adicionar.html';
        }

        function irDeletar() {
            window.location.href = 'deletar.html';
        }

        
        async function buscarDados() {
        const lista = document.getElementById('lista-avisos');

        try {
            const response = await fetch('./db.json'); 
            const dados = await response.json();

            lista.innerHTML = '';

           
            if (!Array.isArray(dados)) {
                lista.innerHTML = '<p>Formato inválido do JSON</p>';
                return;
            }

            for (let i = 0; i < dados.length; i++) {
                const item = dados[i];

                lista.innerHTML += `
                <li>
                    <div class="rounded bg-white p-4 shadow">
                        <h3 class="text-xl font-bold">${item.titulo}</h3>
                        <p class="text-gray-600">${item.conteudo}</p>
                    </div>
                </li>
            `;
            }

        } catch (erro) {
            console.log(erro);
            lista.innerHTML = '<p>Erro ao carregar avisos</p>';
        }
    }

        
        verificarLogin();
        buscarDados();
    </script>
</body>
</html>
