<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Aviso</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <header>
        <nav class="flex items-center justify-between bg-blue-950 px-6 py-4 text-white">

           
            <div class="flex flex-row gap-1">
                <h1 class="text-2xl font-bold">Avisos</h1>
                <h1 class="text-2xl font-bold text-orange-600">Senai</h1>
            </div>

            
            <div id="menu-admin" class="hidden gap-6 font-medium md:flex">
                <button onclick="irAdicionar()" class="hover:text-blue-300">Adicionar</button>
                <button onclick="irDeletar()" class="hover:text-blue-300">Deletar</button>
            </div>

           
            <div>
                <button onclick="logout()" class="underline">Sair</button>
            </div>
        </nav>
    </header>

    <main class="mx-auto max-w-lg p-8">
        <div class="rounded bg-white p-6 shadow">
            <h2 class="mb-4 text-xl font-bold">Novo Aviso</h2>

            <input type="text" id="titulo" placeholder="Título do Aviso" class="mb-4 w-full border p-2">
            <textarea id="conteudo" placeholder="Conteúdo" class="mb-4 h-32 w-full border p-2"></textarea>

            <button onclick="salvar()" class="rounded bg-orange-600 px-4 py-2 text-white">
                Salvar Aviso
            </button>
        </div>
    </main>

    <script>
        
        if (localStorage.getItem('logado') !== 'true') {
            window.location.href = 'login.html';
        }

       
        function verificarLogin() {
            const menu = document.getElementById('menu-admin');
            menu.classList.remove('hidden');
        }

        
        function irAdicionar() {
            window.location.href = 'adicionar.html';
        }

        function irDeletar() {
            window.location.href = 'deletar.html';
        }

        function logout() {
            localStorage.removeItem('logado');
            window.location.href = 'login.html';
        }

       
        async function salvar() {
            const tit = document.getElementById('titulo').value;
            const cont = document.getElementById('conteudo').value;

            await fetch('/salvar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ titulo: tit, conteudo: cont })
            });

           
            window.location.href = 'index.html';
        }

        verificarLogin();
    </script>
</body>
</html>
