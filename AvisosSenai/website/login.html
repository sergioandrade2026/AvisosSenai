<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex min-h-screen items-center justify-center bg-gray-100">
    <div class="w-96 rounded-lg bg-white p-8 shadow-md">
        <h2 class="mb-6 text-center text-2xl font-bold text-blue-950">Login Admin</h2>
        <input type="text" id="usuario" placeholder="Usuário" class="mb-4 w-full rounded border p-2">
        <input type="password" id="senha" placeholder="Senha" class="mb-4 w-full rounded border p-2">
        <button onclick="fazerLogin()" class="w-full rounded bg-blue-950 p-2 text-white hover:bg-blue-900">Entrar</button>
        <p id="erro" class="mt-4 hidden text-center text-red-500">Dados incorretos!</p>
    </div>

    <script>
        async function fazerLogin() {
            const userIn = document.getElementById('usuario').value;
            const passIn = document.getElementById('senha').value;

            const response = await fetch('admin.json');
            const admin = await response.json();
           

            if (userIn === admin.usuario && passIn === admin.senha) {
                localStorage.setItem('logado', 'true');
                window.location.href = 'adicionar.html';
            } else {
                document.getElementById('erro').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
